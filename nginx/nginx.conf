worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream app_backend {
        least_conn;
        server app:5000;
        server app2:5000;

        # Reuse TCP connections to Gunicorn instead of opening a new one per
        # request. Without this, each proxied request pays a full TCP handshake
        # cost and the Gunicorn socket backlog saturates quickly under 500 VUs.
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://app_backend;
            proxy_http_version 1.1;

            # Required for upstream keepalive to work.
            proxy_set_header Connection "";

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fail fast if Gunicorn is unreachable rather than holding the
            # client socket open. 30 s matches the Gunicorn worker timeout.
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }
    }
}
