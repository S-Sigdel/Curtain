groups:
  - name: curtain-incident-response
    rules:
      - alert: CurtainServiceDown
        expr: sum(up{job="curtain-app"}) < 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Curtain service is down
          description: Prometheus has not been able to scrape any Curtain app instance for at least 1 minute.

      - alert: CurtainInstanceDown
        expr: sum(up{job="curtain-app"}) < 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Curtain instance degraded
          description: One or more Curtain app instances are unreachable. Load balancer is operating with reduced capacity.

      - alert: CurtainHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="curtain-app",status_code=~"5.."}[2m]))
            /
            clamp_min(sum(rate(http_requests_total{job="curtain-app"}[2m])), 1)
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Curtain high error rate
          description: 5xx responses have exceeded 5 percent for at least 2 minutes.

      - alert: CurtainRedisShardFailures
        expr: increase(redis_shard_failures_total{job="curtain-app"}[1m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Redis shard {{ $labels.shard_id }} is failing
          description: More than 5 shard connection failures in the last minute. Traffic is being rerouted via the hash ring failover.
