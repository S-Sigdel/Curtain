<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="url"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #message { margin-top: 20px; padding: 15px; border-radius: 4px; min-height: 20px; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }
        .loading { display: none; }
        .htmx-request .loading { display: inline; }
        .htmx-request button { opacity: 0.5; }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>
    <p>A minimal frontend to test the URL shortening service.</p>

    <form hx-post="/shorten-ui" hx-target="#message" hx-indicator=".loading">
        <div class="form-group">
            <label for="original_url">Original URL:</label>
            <input type="url" id="original_url" name="original_url" required placeholder="https://www.wikipedia.org/">
        </div>
        <div class="form-group">
            <label for="title">Title (Optional):</label>
            <input type="text" id="title" name="title" placeholder="Wikipedia">
        </div>
        <div class="form-group">
            <label for="user_id">User ID (Optional):</label>
            <input type="number" id="user_id" name="user_id" placeholder="1">
        </div>
        <button type="submit">Shorten</button>
        <span class="loading">Processing...</span>
    </form>

    <div id="message"></div>

    <hr style="margin-top: 40px;">
    <h2>Reference</h2>
    <ul>
        <li>API POST: <code>/urls</code></li>
        <li>API GET: <code>/urls/&lt;id&gt;</code></li>
        <li>Health: <a href="/health"><code>/health</code></a></li>
    </ul>
</body>
</html>
