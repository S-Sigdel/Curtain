name: curtain

services:
  app:
    build:
      context: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      redis_cache:
        condition: service_started
    environment:
      FLASK_DEBUG: "false"
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hackathon_db
      REDIS_URL: redis://redis:6379/0
      CACHE_REDIS_URL: redis://redis_cache:6379/0
      ENABLE_INCIDENT_DEBUG_ROUTES: ${ENABLE_INCIDENT_DEBUG_ROUTES:-false}
    volumes:
      - .:/app
    command: uv run gunicorn -c gunicorn.conf.py run:app
    deploy:
      replicas: 2

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v3.2.1
    platform: linux/amd64
    user: "0:0"
    depends_on:
      app:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  notifier:
    build:
      context: .
    depends_on:
      prometheus:
        condition: service_started
      discord_relay:
        condition: service_started
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      NOTIFIER_WEBHOOK_URL: http://discord_relay:8080/alert
      NOTIFIER_POLL_SECONDS: "15"
    command: uv run python monitoring/prometheus_notifier.py

  discord_relay:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    command: uv run python monitoring/discord_webhook_relay.py

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redis_cache:
    image: redis:7-alpine
    volumes:
      - redis_cache_data:/data

volumes:
  postgres_data:
  redis_data:
  redis_cache_data:
  grafana_data:
