name: curtain

services:
  app:
    build:
      context: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      redis_cache:
        condition: service_started
    environment:
      FLASK_DEBUG: "false"
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hackathon_db
      REDIS_URL: redis://redis:6379/0
      CACHE_REDIS_URL: redis://redis_cache:6379/0
    volumes:
      - .:/app
    command: uv run gunicorn -w 2 -b 0.0.0.0:5000 run:app

  app2:
    build:
      context: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      redis_cache:
        condition: service_started
    environment:
      FLASK_DEBUG: "false"
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hackathon_db
      REDIS_URL: redis://redis:6379/0
      CACHE_REDIS_URL: redis://redis_cache:6379/0
    volumes:
      - .:/app
    command: uv run gunicorn -w 2 -b 0.0.0.0:5000 run:app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
      app2:
        condition: service_started
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redis_cache:
    image: redis:7-alpine
    volumes:
      - redis_cache_data:/data

volumes:
  postgres_data:
  redis_data:
  redis_cache_data:
